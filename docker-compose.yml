services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: jarvis
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ./skills:/home/node/.openclaw/skills
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
      - ./config/cron:/home/node/.openclaw/cron
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  openclaw-data:
    driver: local
